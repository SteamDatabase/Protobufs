import "common.proto";

message CAccountScore_FetchScore_Request {
	optional uint32 account_id = 1;
	repeated int32 scoreids = 2;
	optional bool recompute = 3 [default = false];
}

message CAccountScore_FetchScore_Response {
	optional uint32 account_id = 1;
	repeated .CAccountScore_Score scores = 2;
}

service AccountScore {
	// ePrivilege=1
	rpc FetchScore (.CAccountScore_FetchScore_Request) returns (.CAccountScore_FetchScore_Response);
}

