import "common.proto";

message CSteamGPT_AMSummary {
	optional string account_name = 1;
	optional string email = 2;
	optional string persona_name = 3;
	optional bool disabled = 5;
	optional bool lockdown = 6;
	optional bool steamguard = 7;
	repeated .CSteamGPT_AMSummary_SecurityHistory security_history = 8;
	optional uint32 reuse_time = 9;
	optional float disuse_spend = 10;
	optional string country = 11;
	optional bool vacbans = 12;
}

message CSteamGPT_AMSummary_SecurityHistory {
	optional int32 action_type = 1;
	optional uint32 time = 2;
	optional bool support_changed = 3;
	optional string old_email = 4;
}

message CSteamGPT_Summary {
	optional .CSteamGPT_AMSummary am = 1;
	repeated .CAccountScore_Score scores = 2;
	optional bool two_factor = 3;
	repeated .CSteamGPT_Summary_Country countries = 4;
	optional bool phone = 5;
	optional string phone_country = 6;
	optional uint32 existing_accounts = 7;
	optional bool high_fraud_email = 8;
	repeated .CSteamGPT_Summary_GamePlaytime playtime = 9;
}

message CSteamGPT_Summary_Country {
	optional string country_code = 1;
	optional uint32 time = 2;
}

message CSteamGPT_Summary_GamePlaytime {
	optional int32 appid = 1;
	optional int32 playtime_2weeks = 2;
	optional int32 playtime_forever = 3;
}

message CSteamGPTSummary_GetAMSummary_Request {
	optional uint64 steamid = 1;
}

message CSteamGPTSummary_GetAMSummary_Response {
	optional .CSteamGPT_AMSummary summary = 1;
}

message CSteamGPTSummary_GetSummary_Request {
	optional uint64 steamid = 1;
}

message CSteamGPTSummary_GetSummary_Response {
	optional .CSteamGPT_Summary summary = 1;
}

service SteamGPTSummary {
	// bConstMethod=true, ePrivilege=1
	rpc GetAMSummary (.CSteamGPTSummary_GetAMSummary_Request) returns (.CSteamGPTSummary_GetAMSummary_Response);
	// bConstMethod=true, ePrivilege=1
	rpc GetSummary (.CSteamGPTSummary_GetSummary_Request) returns (.CSteamGPTSummary_GetSummary_Response);
}

