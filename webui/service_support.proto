	optional uint32 accountid = 1;
	optional fixed64 transid = 2;
	optional fixed64 line_item = 3;
	optional fixed64 distributor_orderid = 4;
	optional string serial_number = 5;
}

message CSupport_UpdateShipmentSerialNumber_Response {
}

message CSupport_UpdateSupportAccountPreferences_Request {
	optional string vdf = 1;
}

message CSupport_UpdateSupportAccountPreferences_Response {
}

message CSupport_WhitelistPartnerBuildChange_Request {
	optional fixed64 steamid = 1;
}

message CSupport_WhitelistPartnerBuildChange_Response {
}

message CSupportData_ChargebackHist {
	optional uint32 accountid = 1;
	optional fixed64 transid = 2;
	optional string chargeback_case = 3;
	optional uint32 time_created = 4;
	optional uint32 time_updated = 5;
	optional int32 chargeback_status = 6;
	optional int32 tp_type = 7;
	optional int32 payment_method = 8;
	optional uint64 ban_id = 9;
	optional string chargeback_note = 10;
}

message CSupportData_FraudScoring {
	optional fixed64 transid = 1;
	optional int32 fraud_status = 2;
	optional int32 score = 3;
}

message CSupportData_PPTransHist {
	optional uint32 accountid = 1;
	optional fixed64 transid = 2;
	optional string checkout_token = 3;
	optional string payer_id = 4;
	optional bool status_verified = 5;
	optional string paypal_transaction_id = 6;
	optional int32 payment_type = 7;
	optional int64 gross_amount = 8;
	optional int64 fee_amount = 9;
	optional int64 settle_amount = 10;
	optional int32 payment_status = 11;
	optional int32 pending_reason = 12;
	optional string billing_agreement_id = 13;
	optional int32 paypal_account = 14;
	optional string payer_email = 15;
	optional bool used_cached_credentials = 16;
}

message PressOutlet {
	optional uint64 outlet_id = 1;
	optional string email_domain = 2;
	optional uint32 slots = 3;
	optional bool active = 4;
	repeated .PressOutlet_Grant grants = 5;
	repeated .PressOutlet_AuditLog log = 6;
	optional string admin_notes = 7;
	optional bool staging = 8;
}

message PressOutlet_AuditLog {
	optional uint32 rtime = 1;
	optional fixed64 actor_steamid = 2;
	optional fixed64 subject_steamid = 3;
	optional uint32 action = 4;
	optional string additional_json_data = 5;
}

message PressOutlet_Grant {
	optional fixed64 steamid = 1;
	optional uint32 rtime_granted = 2;
	optional bool is_outlet_admin = 3;
	optional int32 pending_state = 4 [(.description) = "enum"];
}

