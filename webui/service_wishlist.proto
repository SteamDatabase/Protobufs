import "common.proto";
import "common_base.proto";

message CWishlist_AddToWishlist_Request {
	optional uint32 appid = 1;
	optional .CUserInterface_NavData navdata = 2;
}

message CWishlist_AddToWishlist_Response {
	optional uint32 wishlist_count = 1;
}

message CWishlist_AddWishlistItemCategory_Request {
	optional uint32 appid = 1;
	optional uint64 categoryid = 2;
	optional string category_name = 3;
}

message CWishlist_AddWishlistItemCategory_Response {
	optional uint64 categoryid = 1;
	optional string name = 2;
	optional int32 item_count = 3;
	optional bool notification_opt_in = 4;
}

message CWishlist_CreateShareToken_Request {
	optional .CWishlistFilters filters = 1;
}

message CWishlist_CreateShareToken_Response {
	optional string token = 1;
}

message CWishlist_GetItemCategories_Request {
	optional uint32 appid = 1;
}

message CWishlist_GetItemCategories_Response {
	repeated .CWishlistCategory categories = 1;
}

message CWishlist_GetSharedWishlistCategories_Request {
	optional fixed64 steamid = 1;
	optional string share_token = 2;
}

message CWishlist_GetSharedWishlistCategories_Response {
	repeated .CWishlistCategory categories = 1;
}

message CWishlist_GetStoreSaleWishlistEnhancementEvent_Request {
	optional uint32 clanid = 1 [default = 0];
	optional uint32 promotionid = 2 [default = 0];
}

message CWishlist_GetStoreSaleWishlistEnhancementEvent_Response {
	repeated .WishlistEnhancementEvent results = 1;
}

message CWishlist_GetWishlist_Request {
	optional fixed64 steamid = 1;
}

message CWishlist_GetWishlist_Response {
	repeated .CWishlist_GetWishlist_Response_WishlistItem items = 1;
}

message CWishlist_GetWishlist_Response_WishlistItem {
	optional uint32 appid = 1;
	optional uint32 priority = 2;
	optional uint32 date_added = 3;
}

message CWishlist_GetWishlistCategories_Request {
}

message CWishlist_GetWishlistCategories_Response {
	repeated .CWishlistCategory categories = 1;
}

message CWishlist_GetWishlistItemCount_Request {
	optional fixed64 steamid = 1;
}

message CWishlist_GetWishlistItemCount_Response {
	optional uint32 count = 1;
}

message CWishlist_GetWishlistItemsOnSale_Request {
	optional .StoreBrowseContext context = 1;
	optional .StoreBrowseItemDataRequest data_request = 2;
}

message CWishlist_GetWishlistItemsOnSale_Response {
	repeated .CWishlist_GetWishlistItemsOnSale_Response_WishlistItem items = 1;
	optional int32 total_items_on_sale = 2;
}

message CWishlist_GetWishlistItemsOnSale_Response_WishlistItem {
	optional uint32 appid = 1;
	optional .StoreItem store_item = 2;
}

message CWishlist_GetWishlistSortedFiltered_Request {
	optional fixed64 steamid = 1;
	optional .StoreBrowseContext context = 2;
	optional .StoreBrowseItemDataRequest data_request = 3;
	optional int32 sort_order = 4 [default = 0, (.description) = "enum"];
	optional .CWishlistFilters filters = 5;
	optional int32 start_index = 6 [default = 0];
	optional int32 page_size = 7 [default = 100];
	optional string share_token = 8;
}

message CWishlist_GetWishlistSortedFiltered_Response {
	repeated .CWishlist_GetWishlistSortedFiltered_Response_WishlistItem items = 1;
}

message CWishlist_GetWishlistSortedFiltered_Response_WishlistItem {
	optional uint32 appid = 1;
	optional uint32 priority = 2;
	optional uint32 date_added = 3;
	optional .StoreItem store_item = 4;
	repeated uint64 category_ids = 5;
}

message CWishlist_RemoveFromWishlist_Request {
	optional uint32 appid = 1;
}

message CWishlist_RemoveFromWishlist_Response {
	optional uint32 wishlist_count = 1;
}

message CWishlist_RemoveWishlistItemCategory_Request {
	optional uint32 appid = 1;
	optional uint64 categoryid = 2;
}

message CWishlist_RemoveWishlistItemCategory_Response {
}

message CWishlist_RevokeShareTokens_Request {
}

message CWishlist_RevokeShareTokens_Response {
	optional uint32 revoked_count = 1;
}

message CWishlist_SetStoreSaleWishlistEnhancementEvent_Request {
	optional .WishlistEnhancementEvent value = 1;
	optional bool is_delete = 7;
}

message CWishlist_SetStoreSaleWishlistEnhancementEvent_Response {
}

message CWishlist_SetWishlistCategoryNotifications_Request {
	repeated .CWishlist_SetWishlistCategoryNotifications_Request_CategorySettings categories = 1;
}

message CWishlist_SetWishlistCategoryNotifications_Request_CategorySettings {
	optional uint64 categoryid = 1;
	optional bool notification_opt_in = 2;
}

message CWishlist_SetWishlistCategoryNotifications_Response {
}

message CWishlistCategory {
	optional uint64 categoryid = 1;
	optional string name = 2;
	optional int32 item_count = 3;
	optional bool notification_opt_in = 4;
}

message CWishlistFilters {
	optional bool macos_only = 1;
	optional bool steamos_linux_only = 2;
	optional bool only_games = 10;
	optional bool only_software = 11;
	optional bool only_dlc = 12;
	optional bool only_free = 13;
	optional int64 max_price_in_cents = 20;
	optional int32 min_discount_percent = 21;
	optional .CWishlistFilters_ExcludeTypeFilters exclude_types = 22;
	optional .CWishlistFilters_SteamDeckFilters steam_deck_filters = 23;
	repeated int32 tagids_must_match = 24;
	repeated int32 excluded_content_descriptors = 25 [(.description) = "enum"];
	repeated uint64 category_ids = 26;
}

message CWishlistFilters_ExcludeTypeFilters {
	optional bool exclude_early_access = 1;
	optional bool exclude_coming_soon = 2;
	optional bool exclude_vr_only = 3;
}

message CWishlistFilters_SteamDeckFilters {
	optional bool include_verified = 1;
	optional bool include_playable = 2;
}

message WishlistEnhancementEvent {
	optional uint32 clanid = 1;
	optional fixed64 gid_event = 2;
	optional string url = 3;
	optional uint32 rtime_start = 4;
	optional uint32 rtime_end = 5;
	optional uint32 promotionid = 6;
}

service Wishlist {
	// ePrivilege=1
	rpc AddToWishlist (.CWishlist_AddToWishlist_Request) returns (.CWishlist_AddToWishlist_Response);
	// ePrivilege=1
	rpc AddWishlistItemCategory (.CWishlist_AddWishlistItemCategory_Request) returns (.CWishlist_AddWishlistItemCategory_Response);
	// ePrivilege=1
	rpc CreateShareToken (.CWishlist_CreateShareToken_Request) returns (.CWishlist_CreateShareToken_Response);
	// bConstMethod=true, ePrivilege=1
	rpc GetItemCategories (.CWishlist_GetItemCategories_Request) returns (.CWishlist_GetItemCategories_Response);
	// bConstMethod=true, ePrivilege=2, eWebAPIKeyRequirement=1
	rpc GetSharedWishlistCategories (.CWishlist_GetSharedWishlistCategories_Request) returns (.CWishlist_GetSharedWishlistCategories_Response);
	// ePrivilege=1
	rpc GetStoreSaleWishlistEnhancementEvent (.CWishlist_GetStoreSaleWishlistEnhancementEvent_Request) returns (.CWishlist_GetStoreSaleWishlistEnhancementEvent_Response);
	// bConstMethod=true, ePrivilege=2, eWebAPIKeyRequirement=1
	rpc GetWishlist (.CWishlist_GetWishlist_Request) returns (.CWishlist_GetWishlist_Response);
	// bConstMethod=true, ePrivilege=1
	rpc GetWishlistCategories (.CWishlist_GetWishlistCategories_Request) returns (.CWishlist_GetWishlistCategories_Response);
	// bConstMethod=true, ePrivilege=2, eWebAPIKeyRequirement=1
	rpc GetWishlistItemCount (.CWishlist_GetWishlistItemCount_Request) returns (.CWishlist_GetWishlistItemCount_Response);
	// bConstMethod=true, ePrivilege=1
	rpc GetWishlistItemsOnSale (.CWishlist_GetWishlistItemsOnSale_Request) returns (.CWishlist_GetWishlistItemsOnSale_Response);
	// bConstMethod=true, ePrivilege=2, eWebAPIKeyRequirement=1
	rpc GetWishlistSortedFiltered (.CWishlist_GetWishlistSortedFiltered_Request) returns (.CWishlist_GetWishlistSortedFiltered_Response);
	// ePrivilege=1
	rpc RemoveFromWishlist (.CWishlist_RemoveFromWishlist_Request) returns (.CWishlist_RemoveFromWishlist_Response);
	// ePrivilege=1
	rpc RemoveWishlistItemCategory (.CWishlist_RemoveWishlistItemCategory_Request) returns (.CWishlist_RemoveWishlistItemCategory_Response);
	// ePrivilege=1
	rpc RevokeShareTokens (.CWishlist_RevokeShareTokens_Request) returns (.CWishlist_RevokeShareTokens_Response);
	// ePrivilege=1
	rpc SetStoreSaleWishlistEnhancementEvent (.CWishlist_SetStoreSaleWishlistEnhancementEvent_Request) returns (.CWishlist_SetStoreSaleWishlistEnhancementEvent_Response);
	// ePrivilege=1
	rpc SetWishlistCategoryNotifications (.CWishlist_SetWishlistCategoryNotifications_Request) returns (.CWishlist_SetWishlistCategoryNotifications_Response);
}

